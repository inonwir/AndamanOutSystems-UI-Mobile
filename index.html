<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Task - Full Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#155EEF; --primary-dark:#0B3FA8; --primary-mid:#3B7BF5; --primary-light:#EBF2FE; --primary-tint:#DCE9FD;
    --navy:#0E2A54;
    --waiting:#E8830D; --waiting-bg:#FFF2E0;
    --assigned:#16A163; --assigned-bg:#E4F9EE;
    --submitted:#0FA3B1; --submitted-bg:#E1F7F9;
    --overdue:#E2483C; --overdue-bg:#FDEAE8;
    --p-critical:#E2483C; --p-high:#E8830D; --p-medium:#EABE2C; --p-low:#4CBB8A; --p-normal:#C7CFDA;
    --text-primary:#111827; --text-secondary:#667085; --text-tertiary:#98A2B3;
    --bg:#F3F5F9; --card-bg:#FFFFFF; --border:#EAECF1;
    --radius-card:18px; --radius-chip:999px;
    --shadow-card:0 1px 2px rgba(16,24,40,.03),0 4px 14px rgba(16,24,40,.055);
    --shadow-card-hover:0 6px 20px rgba(21,94,239,.14),0 2px 6px rgba(16,24,40,.06);
    --shadow-nav:0 -2px 16px rgba(16,24,40,.06);
    --shadow-modal:0 24px 70px rgba(14,42,84,.28);
    --shadow-header:0 8px 24px rgba(11,63,168,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Noto Sans Thai','Inter',system-ui,sans-serif;
    background:var(--bg); color:var(--text-primary);
    height:100vh; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  button, input, select, textarea{ font-family:inherit; }

  .device{
    position:relative; background:#0d0f12; border-radius:38px;
    box-shadow:0 30px 80px rgba(0,0,0,.35); padding:14px;
    width:768px; height:1024px; max-height:96vh; max-width:96vw;
    aspect-ratio:3/4; transition:width .35s ease, aspect-ratio .35s ease;
  }
  .device.landscape{ aspect-ratio:4/3; width:1150px; }
  .screen{
    position:relative; width:100%; height:100%; background:var(--bg);
    border-radius:24px; overflow:hidden; display:flex; flex-direction:column;
  }

  .statusbar{
    height:32px; flex:0 0 auto; background:var(--navy);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 18px; color:#fff; font-size:12px; font-weight:600; font-family:'Inter',sans-serif;
  }
  .statusbar .icons{display:flex; gap:6px; align-items:center;}

  .app-header{
    position:relative; flex:0 0 auto; overflow:hidden;
    background:linear-gradient(160deg,var(--primary-mid) 0%,var(--primary) 45%,var(--navy) 130%);
    padding:14px 18px 18px; color:#fff; box-shadow:var(--shadow-header);
  }
  .app-header::before{
    content:''; position:absolute; top:-60px; right:-40px; width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.12), transparent 70%); pointer-events:none;
  }
  .app-header::after{
    content:''; position:absolute; bottom:-70px; left:20%; width:180px; height:180px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.06), transparent 70%); pointer-events:none;
  }
  .top-row{ position:relative; display:flex; align-items:center; justify-content:space-between; z-index:1; }
  .top-row .left{ display:flex; align-items:center; gap:12px; min-width:0; }
  .icon-btn{
    width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    border-radius:11px; background:rgba(255,255,255,.15); cursor:pointer; border:none; color:#fff; flex:0 0 auto;
    backdrop-filter:blur(4px); transition:background .15s ease, transform .12s ease;
  }
  .icon-btn:active{ background:rgba(255,255,255,.3); transform:scale(.93); }
  .app-title{ font-size:19px; font-weight:800; letter-spacing:.1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .app-subtitle{ font-size:12px; opacity:.85; margin-top:1px; }

  .search-row{ position:relative; z-index:1; margin-top:16px; display:flex; gap:10px; }
  .search-box{
    flex:1; background:rgba(255,255,255,.96); border-radius:13px; height:46px; display:flex; align-items:center; gap:10px;
    padding:0 14px; color:var(--text-secondary); font-size:14px; box-shadow:0 4px 14px rgba(11,63,168,.12);
  }
  .search-box input{ border:none; outline:none; flex:1; font-size:14px; color:var(--text-primary); background:transparent; }
  .search-box input::placeholder{ color:var(--text-tertiary); }
  .filter-btn{
    background:rgba(255,255,255,.96); color:var(--primary); border:none; border-radius:13px; height:46px; padding:0 18px;
    display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px; cursor:pointer; white-space:nowrap; position:relative;
    box-shadow:0 4px 14px rgba(11,63,168,.12); transition:transform .12s ease;
  }
  .filter-btn:active{ transform:scale(.96); }
  .filter-btn .badge-dot{ position:absolute; top:6px; right:8px; width:8px; height:8px; border-radius:50%; background:var(--overdue); box-shadow:0 0 0 2px #fff; }

  .chip-row{
    flex:0 0 auto; display:flex; gap:9px; padding:14px 18px; overflow-x:auto;
    background:var(--bg); border-bottom:1px solid var(--border); scrollbar-width:none;
  }
  .chip-row::-webkit-scrollbar{ display:none; }
  .chip{
    display:flex; align-items:center; gap:7px; height:40px; padding:0 15px; border-radius:var(--radius-chip);
    font-size:12.5px; font-weight:700; border:1.5px solid var(--border); background:#fff; color:var(--text-secondary);
    cursor:pointer; white-space:nowrap; flex:0 0 auto; transition:all .15s ease;
  }
  .chip:active{ transform:scale(.96); }
  .chip .count{ background:rgba(0,0,0,.05); color:var(--text-secondary); border-radius:999px; font-size:11px; padding:1px 7px; font-weight:800; }
  .chip.active{ background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:0 4px 12px rgba(21,94,239,.28); }
  .chip.active .count{ background:rgba(255,255,255,.25); color:#fff; }
  .chip[data-key="waiting"]{ color:var(--waiting); } .chip[data-key="assigned"]{ color:var(--assigned); }
  .chip[data-key="submitted"]{ color:var(--submitted); } .chip[data-key="all"]{ color:var(--primary); } .chip[data-key="overdue"]{ color:var(--overdue); }
  .chip.active[data-key]{ color:#fff; }
  .chip[data-key="waiting"].active{ background:var(--waiting); border-color:var(--waiting); }
  .chip[data-key="assigned"].active{ background:var(--assigned); border-color:var(--assigned); }
  .chip[data-key="submitted"].active{ background:var(--submitted); border-color:var(--submitted); }
  .chip[data-key="overdue"].active{ background:var(--overdue); border-color:var(--overdue); }

  .list-meta{ flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:12px 18px 4px; font-size:13px; color:var(--text-secondary); }
  .sort-btn{ display:flex; align-items:center; gap:6px; color:var(--primary); font-weight:600; cursor:pointer; }

  .body-scroll{ flex:1 1 auto; overflow-y:auto; }
  .list-wrap{ padding:8px 18px 18px; display:grid; grid-template-columns:1fr; gap:12px; align-content:start; }
  .device.landscape .list-wrap{ grid-template-columns:1fr 1fr; }
  .device.landscape .list-wrap.single-col{ grid-template-columns:1fr; max-width:640px; margin:0 auto; }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--text-secondary); }
  .empty-state svg{ opacity:.35; margin-bottom:12px; }
  .empty-state .t{ font-weight:700; color:var(--text-primary); margin-bottom:4px; }
  .empty-state .s{ font-size:13px; }

  .card{
    position:relative; background:var(--card-bg); border-radius:var(--radius-card); box-shadow:var(--shadow-card);
    padding:15px 15px 15px 17px; border-left:none; cursor:pointer; border:1px solid var(--border);
    transition:transform .14s ease, box-shadow .14s ease; animation:fadeIn .3s ease;
  }
  .card::before{
    content:''; position:absolute; left:0; top:14px; bottom:14px; width:4px; border-radius:4px; background:var(--p-normal);
  }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .card:active{ transform:scale(.983); box-shadow:var(--shadow-card-hover); }
  .card.p-critical::before{ background:var(--p-critical); } .card.p-high::before{ background:var(--p-high); }
  .card.p-medium::before{ background:var(--p-medium); } .card.p-low::before{ background:var(--p-low); }

  .card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; padding-left:6px; }
  .card-top .left{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .wo-no{ font-size:12.5px; font-weight:700; color:var(--text-tertiary); font-family:'Inter',sans-serif; letter-spacing:.2px; }
  .type-tag{ font-size:10.5px; font-weight:800; background:var(--primary-tint); color:var(--primary-dark); border-radius:7px; padding:3px 7px; font-family:'Inter',sans-serif; letter-spacing:.4px; }
  .status-badge{ font-size:10.5px; font-weight:800; padding:5px 10px; border-radius:8px; white-space:nowrap; letter-spacing:.3px; }
  .status-badge.waiting{ background:var(--waiting-bg); color:var(--waiting); }
  .status-badge.assigned{ background:var(--assigned-bg); color:var(--assigned); }
  .status-badge.submitted{ background:var(--submitted-bg); color:var(--submitted); }

  .kebab-wrap{ position:relative; flex:0 0 auto; }
  .kebab{ width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:8px; color:var(--text-tertiary); cursor:pointer; transition:background .12s ease; }
  .kebab:active{ background:rgba(0,0,0,.06); }
  .kebab-menu{
    position:absolute; top:34px; right:0; background:#fff; border-radius:12px; box-shadow:var(--shadow-modal);
    min-width:170px; z-index:20; overflow:hidden; border:1px solid var(--border); animation:fadeIn .15s ease;
  }
  .kebab-menu .item{ padding:12px 14px; font-size:13px; font-weight:600; color:var(--text-primary); cursor:pointer; display:flex; align-items:center; gap:9px; }
  .kebab-menu .item:hover{ background:var(--bg); }
  .kebab-menu .item.danger{ color:var(--overdue); }

  .card-title{ font-size:16.5px; font-weight:800; margin-top:9px; color:var(--text-primary); line-height:1.3; padding-left:6px; letter-spacing:-.1px; }
  .card-subtitle{ font-size:12.5px; color:var(--text-secondary); margin-top:3px; padding-left:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-bottom{ display:flex; align-items:flex-end; justify-content:space-between; margin-top:13px; gap:8px; padding-left:6px; }
  .tags{ display:flex; gap:6px; flex-wrap:wrap; }
  .tag{ font-size:10.5px; font-weight:700; color:var(--text-secondary); background:var(--bg); border-radius:7px; padding:4px 8px; }
  .due{ text-align:right; flex:0 0 auto; }
  .due .label{ font-size:10px; color:var(--text-tertiary); font-weight:700; letter-spacing:.3px; }
  .due .date{ font-size:13px; font-weight:800; color:var(--overdue); font-family:'Inter',sans-serif; }
  .due .date.ok{ color:var(--text-primary); }
  .draft-flag{ display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; color:var(--primary); background:var(--primary-light); padding:3px 8px; border-radius:7px; margin-top:9px; margin-left:6px; }

  .bottom-nav{ flex:0 0 auto; display:flex; background:#fff; box-shadow:var(--shadow-nav); padding:8px 6px 12px; border-top:1px solid var(--border); }
  .nav-item{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:7px 4px; border-radius:13px; color:var(--text-tertiary); cursor:pointer; min-height:44px; justify-content:center; position:relative; transition:background .15s ease, color .15s ease; }
  .nav-item.active{ color:var(--primary); background:var(--primary-light); }
  .nav-item .label{ font-size:10.5px; font-weight:700; }
  .nav-item .dot-badge{ position:absolute; top:2px; right:22%; width:8px; height:8px; border-radius:50%; background:var(--overdue); border:2px solid #fff; }

  /* ===== Detail / Form screen ===== */
  .detail-body{ padding:16px 18px 100px; }
  .device.landscape .detail-body{ max-width:760px; margin:0 auto; padding-bottom:110px; }
  .section-card{ background:#fff; border-radius:18px; box-shadow:var(--shadow-card); padding:19px; margin-bottom:14px; border:1px solid var(--border); }
  .section-title{ font-size:14.5px; font-weight:800; color:var(--text-primary); display:flex; align-items:center; gap:9px; margin-bottom:16px; }
  .section-title .num{ width:23px; height:23px; border-radius:8px; background:linear-gradient(135deg,var(--primary-mid),var(--primary-dark)); color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }

  .info-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px 16px; }
  .info-item .k{ font-size:10.5px; color:var(--text-tertiary); margin-bottom:3px; font-weight:700; letter-spacing:.2px; }
  .info-item .v{ font-size:14px; font-weight:700; color:var(--text-primary); }
  .desc-box{ margin-top:15px; padding:13px; background:var(--bg); border-radius:12px; font-size:13px; color:var(--text-secondary); line-height:1.55; border-left:3px solid var(--primary-tint); }

  .field{ margin-bottom:16px; }
  .field:last-child{ margin-bottom:0; }
  .field label{ display:flex; font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:7px; align-items:center; gap:4px; }
  .field label .req{ color:var(--overdue); }
  .field .hint{ font-size:11.5px; color:var(--text-tertiary); margin-top:5px; }
  .field input[type=text], .field input[type=date], .field input[type=number], .field select, .field textarea{
    width:100%; border:1.5px solid var(--border); border-radius:11px; padding:12px 13px; font-size:14px;
    color:var(--text-primary); outline:none; background:var(--bg); transition:border-color .15s ease, background .15s ease, box-shadow .15s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--primary); background:#fff; box-shadow:0 0 0 3px var(--primary-tint); }
  .field.invalid input, .field.invalid textarea, .field.invalid select{ border-color:var(--overdue); background:var(--overdue-bg); }
  .field.invalid .err{ display:block; }
  .field textarea{ resize:vertical; min-height:80px; }
  .err{ display:none; color:var(--overdue); font-size:11.5px; margin-top:5px; font-weight:600; }

  .radio-row{ display:flex; gap:10px; flex-wrap:wrap; }
  .radio-opt{
    flex:1; min-width:110px; border:1.5px solid var(--border); border-radius:12px; padding:12px 10px; text-align:center;
    font-size:13px; font-weight:700; color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
    background:var(--bg); transition:all .13s ease;
  }
  .radio-opt.sel-pass.selected{ border-color:var(--assigned); background:var(--assigned-bg); color:var(--assigned); box-shadow:0 3px 10px rgba(22,161,99,.18); }
  .radio-opt.sel-fail.selected{ border-color:var(--overdue); background:var(--overdue-bg); color:var(--overdue); box-shadow:0 3px 10px rgba(226,72,60,.18); }
  .radio-opt.sel-follow.selected{ border-color:var(--waiting); background:var(--waiting-bg); color:var(--waiting); box-shadow:0 3px 10px rgba(232,131,13,.18); }

  .measure-table{ width:100%; border-collapse:collapse; margin-top:4px; }
  .measure-table th{ font-size:11px; color:var(--text-secondary); text-align:left; padding:0 6px 8px; font-weight:700; }
  .measure-table td{ padding:4px 6px 4px 0; }
  .measure-table input{ width:100%; border:1.5px solid var(--border); border-radius:8px; padding:8px 9px; font-size:13px; outline:none; }
  .measure-table input:focus{ border-color:var(--primary); }
  .row-del{ width:30px; height:30px; border-radius:8px; background:var(--overdue-bg); color:var(--overdue); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .add-row-btn{
    margin-top:10px; display:flex; align-items:center; gap:6px; color:var(--primary); font-weight:700; font-size:13px;
    background:var(--primary-light); border:none; border-radius:10px; padding:9px 14px; cursor:pointer;
  }

  .upload-zone{ border:1.5px dashed var(--border); border-radius:12px; padding:20px; text-align:center; color:var(--text-secondary); cursor:pointer; font-size:13px; }
  .upload-zone:hover{ border-color:var(--primary); color:var(--primary); }
  .file-chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .file-chip{ display:flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:12px; color:var(--text-primary); }
  .file-chip button{ border:none; background:none; color:var(--text-tertiary); cursor:pointer; font-size:14px; line-height:1; padding:0; }

  .confirm-row{ display:flex; align-items:flex-start; gap:10px; padding:12px; background:var(--bg); border-radius:10px; cursor:pointer; }
  .confirm-row input{ width:18px; height:18px; margin-top:1px; accent-color:var(--primary); flex:0 0 auto; }
  .confirm-row span{ font-size:13px; color:var(--text-primary); line-height:1.4; }

  .detail-actionbar{
    position:absolute; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--border);
    padding:12px 18px calc(14px + env(safe-area-inset-bottom)); display:flex; gap:10px; box-shadow:0 -4px 16px rgba(16,24,40,.08);
  }
  .btn{ flex:1; height:49px; border-radius:13px; font-size:14px; font-weight:700; cursor:pointer; border:none; display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .12s ease, filter .12s ease; }
  .btn:active{ transform:scale(.97); }
  .btn-outline{ background:#fff; border:1.5px solid var(--border); color:var(--text-primary); }
  .btn-outline:active{ background:var(--bg); }
  .btn-primary{ background:linear-gradient(135deg,var(--primary-mid),var(--primary-dark)); color:#fff; box-shadow:0 6px 16px rgba(21,94,239,.32); }
  .btn-primary:active{ filter:brightness(.94); }
  .btn-primary:disabled, .btn-outline:disabled{ opacity:.5; cursor:not-allowed; }
  .btn-danger-outline{ background:#fff; border:1.5px solid var(--overdue); color:var(--overdue); }

  /* ===== Side Drawer ===== */
  .drawer-overlay{
    position:absolute; inset:0; background:rgba(11,20,38,.5); z-index:70; opacity:0; pointer-events:none;
    transition:opacity .25s ease; backdrop-filter:blur(1px);
  }
  .drawer-overlay.open{ opacity:1; pointer-events:auto; }
  .drawer{
    position:absolute; top:0; bottom:0; left:0; width:78%; max-width:300px; background:#fff; z-index:71;
    transform:translateX(-100%); transition:transform .28s cubic-bezier(.32,.72,0,1); display:flex; flex-direction:column;
    box-shadow:12px 0 40px rgba(11,20,38,.25);
  }
  .drawer.open{ transform:translateX(0); }
  .drawer-head{
    position:relative; overflow:hidden; padding:26px 20px 22px;
    background:linear-gradient(155deg,var(--primary-mid),var(--primary) 55%,var(--navy) 130%); color:#fff; flex:0 0 auto;
  }
  .drawer-head::before{ content:''; position:absolute; top:-50px; right:-30px; width:160px; height:160px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,.14), transparent 70%); }
  .drawer-avatar{ width:56px; height:56px; border-radius:16px; background:rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:20px; margin-bottom:12px; position:relative; z-index:1; }
  .drawer-name{ font-size:16px; font-weight:800; position:relative; z-index:1; }
  .drawer-role{ font-size:12px; opacity:.85; margin-top:2px; position:relative; z-index:1; }
  .drawer-close{
    position:absolute; top:16px; right:16px; width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.16);
    border:none; color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:2;
  }
  .drawer-body{ flex:1; overflow-y:auto; padding:14px 10px; }
  .drawer-section-label{ font-size:11px; font-weight:800; color:var(--text-tertiary); letter-spacing:.5px; padding:10px 12px 6px; }
  .drawer-item{
    display:flex; align-items:center; gap:13px; padding:12px 12px; border-radius:12px; cursor:pointer; color:var(--text-primary);
    font-size:14px; font-weight:600; margin-bottom:2px; transition:background .12s ease;
  }
  .drawer-item:active{ background:var(--bg); }
  .drawer-item.active{ background:var(--primary-light); color:var(--primary); }
  .drawer-item .di-icon{ width:36px; height:36px; border-radius:10px; background:var(--bg); color:var(--text-secondary); display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .drawer-item.active .di-icon{ background:var(--primary); color:#fff; }
  .drawer-item .di-badge{ margin-left:auto; background:var(--overdue); color:#fff; font-size:10.5px; font-weight:800; border-radius:999px; padding:2px 8px; }
  .drawer-divider{ height:1px; background:var(--border); margin:10px 12px; }
  .drawer-foot{ flex:0 0 auto; padding:14px; border-top:1px solid var(--border); }
  .drawer-logout{
    width:100%; height:46px; border-radius:12px; border:1.5px solid var(--overdue-bg); background:var(--overdue-bg); color:var(--overdue);
    font-weight:700; font-size:13.5px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .drawer-version{ text-align:center; font-size:10.5px; color:var(--text-tertiary); margin-top:10px; }

  /* ===== Modal / Filter panel ===== */

  render();
  S.toastTimer = setTimeout(()=>{ S.toast=null; render(); }, 2400);
}

function dateToDMY(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function taskCounts(list){
  return {
    all:list.length,
    waiting:list.filter(t=>t.status==='waiting').length,
    assigned:list.filter(t=>t.status==='assigned').length,
    submitted:list.filter(t=>t.status==='submitted').length,
  };
}

function isOverdue(due){
  const [d,m,y] = due.split('/').map(Number);
  const dueDate = new Date(y,m-1,d);
  return dueDate < new Date(2026,6,3);
}

function filteredSortedTasks(scope){
  let list = scope==='mine' ? S.tasks.filter(t=>t.status!=='submitted' || t.id===10) : S.tasks;
  if(S.filter!=='all') list = list.filter(t=>t.status===S.filter);
  if(S.filterPriority.length) list = list.filter(t=>S.filterPriority.includes(t.priority));
  if(S.filterType.length) list = list.filter(t=>S.filterType.includes(t.type));
  if(S.search.trim()){
    const q = S.search.trim().toLowerCase();
    list = list.filter(t=> t.wo.toLowerCase().includes(q) || t.title.toLowerCase().includes(q) || t.equipment.toLowerCase().includes(q));
  }
  list = [...list].sort((a,b)=>{
    const pa = a.due.split('/').reverse().join('');
    const pb = b.due.split('/').reverse().join('');
    return S.sort==='due-asc' ? pa.localeCompare(pb) : pb.localeCompare(pa);
  });
  return list;
}

              <option value="medium" ${f.priority==='medium'?'selected':''}>Medium</option>
              <option value="high" ${f.priority==='high'?'selected':''}>High</option>
              <option value="critical" ${f.priority==='critical'?'selected':''}>Critical / Overdue</option>
            </select>
          </div>

          <div class="field ${err.due?'invalid':''}">
            <label>SAP Due Date <span class="req">*</span></label>
            <input type="date" value="${f.due||''}" oninput="setCreateField('due', this.value)"/>
            <div class="err">กรุณาระบุวันครบกำหนด</div>
          </div>

          <div class="field">
            <label>รายละเอียดงาน (Description)</label>
            <textarea placeholder="อธิบายรายละเอียดขอบเขตงาน..." oninput="setCreateField('desc', this.value)">${f.desc||''}</textarea>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-actionbar">
      <button class="btn btn-outline" onclick="resetCreateForm()">ล้างข้อมูล</button>
      <button class="btn btn-primary" onclick="submitCreateWO()">${ICONS.plus} สร้างใบสั่งงาน</button>
    </div>
  `;
}

/* ============ SCREEN: NOTIFICATION ============ */
function renderNotifScreen(){
  return `
    <div class="app-header">
      <div class="top-row">
        <div class="left"><div class="icon-btn" onclick="toggleDrawer()">${ICONS.menu}</div><span class="app-title">Notification</span></div>
        <div class="icon-btn" onclick="markAllRead()" title="อ่านทั้งหมด">${ICONS.check}</div>
      </div>
    </div>
    <div class="body-scroll">
      ${S.notifications.map(n=>`
        <div class="notif-item ${n.unread?'unread':''}" onclick="readNotif(${n.id})">
          <div class="notif-icon">${ICONS[n.icon]||ICONS.bell}</div>
          <div class="notif-body">
            <div class="notif-title">${n.title}</div>
            <div class="notif-desc">${n.desc}</div>
            <div class="notif-time">${n.time}</div>
          </div>
          ${n.unread?'<div class="unread-dot"></div>':''}
        </div>
      `).join('')}
    </div>
    ${bottomNav()}
  `;
}

/* ============ SCREEN: PROFILE ============ */
function renderProfileScreen(){
  const submittedCount = S.tasks.filter(t=>t.status==='submitted').length;
  const waitingCount = S.tasks.filter(t=>t.status==='waiting').length;
  const assignedCount = S.tasks.filter(t=>t.status==='assigned').length;
  return `
    <div class="app-header" style="padding-bottom:0;">
      <div class="top-row"><div class="left"><div class="icon-btn" onclick="toggleDrawer()">${ICONS.menu}</div><span class="app-title">Profile</span></div></div>
    </div>
    <div class="body-scroll">
      <div class="profile-hero">
        <div class="avatar">ไก</div>
        <h2>ไก - เจ้าหน้าที่ตรวจสอบ</h2>
        <p>Inspection Engineer · Platong Platform</p>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="n">${waitingCount}</div><div class="l">รอดำเนินการ</div></div>
        <div class="stat-card"><div class="n">${assignedCount}</div><div class="l">ได้รับมอบหมาย</div></div>
        <div class="stat-card"><div class="n">${submittedCount}</div><div class="l">ส่งงานแล้ว</div></div>
      </div>
      <div class="menu-list">
        <div class="menu-row" onclick="toast('เปิดข้อมูลส่วนตัว (จำลอง)')"><div class="mi">${ICONS.user}</div><span>ข้อมูลส่วนตัว</span></div>
        <div class="menu-row" onclick="toast('เปิดประวัติการทำงาน (จำลอง)')"><div class="mi">${ICONS.file}</div><span>ประวัติการทำงาน</span></div>
        <div class="menu-row" onclick="toast('เปิดการแจ้งเตือน (จำลอง)')"><div class="mi">${ICONS.bell}</div><span>ตั้งค่าการแจ้งเตือน</span></div>
        <div class="menu-row" onclick="toast('เปิดความช่วยเหลือ (จำลอง)')"><div class="mi">${ICONS.search}</div><span>ช่วยเหลือ & ติดต่อเรา</span></div>
      </div>
      <button class="logout-btn" onclick="toast('ออกจากระบบ (จำลอง)','error')">ออกจากระบบ</button>
    </div>
    ${bottomNav()}
  `;
}

/* ============ MAIN RENDER ============ */
function render(){
  let html = statusBar();
  if(S.view==='detail'){
    html += renderDetailScreen();
  } else if(S.tab==='mytask'){
    html += renderListScreen('mine');
  } else if(S.tab==='alltask'){
    html += renderListScreen('all');
  } else if(S.tab==='create'){
    html += renderCreateScreen();
  } else if(S.tab==='notification'){
    html += renderNotifScreen();
  } else if(S.tab==='profile'){
    html += renderProfileScreen();
  }
  if(S.toast){
    html += `<div class="toast ${S.toast.type==='error'?'error':''}"><span class="ic">${S.toast.type==='error'?ICONS.x:ICONS.check}</span>${S.toast.msg}</div>`;
  }
  html += drawerHtml();
  document.getElementById('screen').innerHTML = html;
}

/* ============ ACTIONS ============ */
function goTab(tab){
  S.tab = tab; S.view='list'; S.kebabOpenId=null; S.filterSheetOpen=false; S.drawerOpen=false;
  if(tab==='create'){ S.createForm={}; S.createErrors={}; }
  render();
}
function toggleDrawer(force){
  S.drawerOpen = typeof force === 'boolean' ? force : !S.drawerOpen;
  render();
}
function setFilter(key){ S.filter = key; S.kebabOpenId=null; render(); }
function toggleSort(){ S.sort = S.sort==='due-asc' ? 'due-desc' : 'due-asc'; render(); }
function onSearch(val){ S.search = val; render(); document.querySelector('.search-box input')?.focus(); }
function toggleKebab(id){ S.kebabOpenId = S.kebabOpenId===id ? null : id; render(); }
function cancelWO(id){
  S.kebabOpenId=null;
  if(confirm('ยืนยันการยกเลิกใบสั่งงานนี้หรือไม่?')){
    S.tasks = S.tasks.filter(t=>t.id!==id);
    toast('ยกเลิกใบสั่งงานเรียบร้อย','error');
  } else { render(); }
}
function openFilterSheet(){ S.filterSheetOpen=true; render(); }
function closeFilterSheet(e){ S.filterSheetOpen=false; render(); }
function toggleFilterVal(key, val){
  const arr = S[key];
  const i = arr.indexOf(val);
  if(i>-1) arr.splice(i,1); else arr.push(val);
  render();
}
function clearFilters(){ S.filterPriority=[]; S.filterType=[]; render(); }

function openDetail(id){
  const t = S.tasks.find(x=>x.id===id);
  S.selectedId = id; S.view='detail'; S.kebabOpenId=null;
  S.inspForm = t.inspection ? JSON.parse(JSON.stringify(t.inspection)) : {rows:[{loc:'',reading:'',std:''}]};
  S.inspErrors = {};
  window.scrollTo(0,0);
  render();
}
function backToList(){ S.view='list'; S.selectedId=null; render(); }

function setInspField(key,val){ S.inspForm[key]=val; if(S.inspErrors[key]) delete S.inspErrors[key]; render(); }
function toggleConfirm(){ S.inspForm.confirm = !S.inspForm.confirm; if(S.inspErrors.confirm) delete S.inspErrors.confirm; render(); }
function setRowField(i,key,val){ S.inspForm.rows[i][key]=val; render(); }
function addRow(){ S.inspForm.rows = S.inspForm.rows||[]; S.inspForm.rows.push({loc:'',reading:'',std:''}); render(); }
function delRow(i){ S.inspForm.rows.splice(i,1); if(!S.inspForm.rows.length) S.inspForm.rows=[{loc:'',reading:'',std:''}]; render(); }
function addFiles(fileList){
  S.inspForm.files = S.inspForm.files || [];
  Array.from(fileList).forEach(f=> S.inspForm.files.push(f.name));
  render();
}
function delFile(i){ S.inspForm.files.splice(i,1); render(); }

function saveDraft(){
  const t = S.tasks.find(x=>x.id===S.selectedId);
  t.inspection = JSON.parse(JSON.stringify(S.inspForm));
  toast('บันทึกร่างเรียบร้อยแล้ว');
}

function confirmSubmit(){
  const f = S.inspForm, err = {};
  if(!f.inspector || !f.inspector.trim()) err.inspector = true;
  if(!f.date) err.date = true;
  if(!f.result) err.result = true;
  if(!f.confirm) err.confirm = true;
  S.inspErrors = err;
  if(Object.keys(err).length){
    render();
    toast('กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน','error');
    return;
  }
  S.confirmSubmitFor = S.selectedId;
  render();
}

function doSubmit(){
  const t = S.tasks.find(x=>x.id===S.selectedId);
  t.inspection = JSON.parse(JSON.stringify(S.inspForm));
  t.status = 'submitted';
  S.confirmSubmitFor = null;
  toast('ส่งงานเรียบร้อยแล้ว');
  setTimeout(()=>{ backToList(); }, 500);
}

function setCreateField(key,val){ S.createForm[key]=val; if(S.createErrors[key]) delete S.createErrors[key]; }
function resetCreateForm(){ S.createForm={}; S.createErrors={}; render(); }
function submitCreateWO(){
  const f = S.createForm, err = {};
  if(!f.title || !f.title.trim()) err.title = true;
  if(!f.type) err.type = true;
  if(!f.equipment || !f.equipment.trim()) err.equipment = true;
  if(!f.due) err.due = true;
  S.createErrors = err;
  if(Object.keys(err).length){ render(); toast('กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน','error'); return; }
  uid++;
  const newTask = {
    id: uid, wo:`2026${String(Math.floor(300000+Math.random()*90000))}`, type:f.type,
    priority: f.priority||'normal', status:'waiting', title:f.title, subtitle:f.desc||'ไม่มีรายละเอียดเพิ่มเติม',
    tags:[f.equipment], due: dateToDMY(f.due), equipment:f.equipment, location:'-', desc: f.desc||'ไม่มีรายละเอียดเพิ่มเติม',
  };
  S.tasks.unshift(newTask);
  toast('สร้างใบสั่งงานเรียบร้อยแล้ว');
  setTimeout(()=>{ goTab('mytask'); }, 500);
}

function readNotif(id){ const n = S.notifications.find(x=>x.id===id); if(n) n.unread=false; render(); }
function markAllRead(){ S.notifications.forEach(n=>n.unread=false); toast('อ่านการแจ้งเตือนทั้งหมดแล้ว'); }

document.getElementById('rotateBtn').addEventListener('click', () => {
  document.getElementById('device').classList.toggle('landscape');
});
document.addEventListener('click', (e)=>{
  if(S.kebabOpenId!==null && !e.target.closest('.kebab-wrap')){ S.kebabOpenId=null; render(); }
});

render();
</script>
</body>
</html>
